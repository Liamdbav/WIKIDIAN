<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wikidian</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 280px;
      padding: 16px;
      margin: 0;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    h1 {
      font-size: 1rem;
      margin: 0 0 14px;
      color: #cba6f7;
    }
    label {
      display: block;
      font-size: 0.75rem;
      margin-bottom: 4px;
      color: #a6adc8;
    }
    input[type="password"] {
      width: 100%;
      box-sizing: border-box;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid #45475a;
      background: #313244;
      color: #cdd6f4;
      font-size: 0.85rem;
      margin-bottom: 8px;
    }
    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 4px;
    }
    button {
      flex: 1;
      padding: 7px;
      border-radius: 6px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
    }
    #save {
      background: #45475a;
      color: #cdd6f4;
    }
    #save:hover { background: #585b70; }
    #capture {
      background: #cba6f7;
      color: #1e1e2e;
    }
    #capture:hover { background: #b4befe; }
    #capture:disabled {
      opacity: 0.5;
      cursor: default;
    }
    #status {
      margin-top: 10px;
      font-size: 0.75rem;
      min-height: 1rem;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h1>Wikidian</h1>
  <label for="apiKey">Clé API Obsidian REST</label>
  <input type="password" id="apiKey" placeholder="Coller votre clé API…" />
  <div class="btn-row">
    <button id="save">Sauvegarder</button>
    <button id="capture">Capturer cette page</button>
  </div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
